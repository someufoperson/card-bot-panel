<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Устройство занято</title>
  <style>
    :root {
      --bg: #1E1F22; --surface: #2B2D30; --text: #BCBEC4;
      --muted: #7A7E85; --border: #393B40; --warning: #D4A843; --accent: #4D9CF8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 36px 40px; text-align: center; max-width: 400px;
    }
    .icon { font-size: 40px; margin-bottom: 16px; }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; line-height: 1.6; }
    .since { font-size: 12px; color: var(--warning); margin-bottom: 20px; }
    .countdown { font-size: 13px; color: var(--muted); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🔒</div>
    <h1>Устройство занято</h1>
    <p class="sub">
      Устройство <strong>{{ device_id }}</strong> сейчас используется в другой сессии.
    </p>
    <p class="since">Подключено: {{ session.connected_at[:19].replace('T', ' ') }}</p>
    <p class="countdown">
      Страница обновится через <span id="t">15</span> сек…
      &nbsp;·&nbsp; <a href="/{{ device_id }}">Обновить сейчас</a>
    </p>
  </div>
  <script>
    let t = 15;
    const el = document.getElementById('t');
    setInterval(() => {
      t--;
      el.textContent = t;
      if (t <= 0) location.reload();
    }, 1000);
  </script>
</body>
</html>
